name: Tests
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip setuptools wheel
        # Explicitly prefer binary wheels and upgrade pip for Python 3.12 support
        pip install --upgrade --prefer-binary 'numpy>=2.0.0' 'pyarrow>=15.0.0' pandas scipy scikit-learn
        # Then install editable dev extras, with build isolation ON so build deps are installed in a clean env
        python -m pip install -e ".[dev]"
    - name: Smoke-test C extensions
      run: |
        python - <<'PY'
        import sys
        try:
            import numpy, pyarrow, pandas, scipy, sklearn
            print("numpy", numpy.__version__)
            print("pyarrow", pyarrow.__version__)
            print("pandas", pandas.__version__)
            print("scipy", scipy.__version__)
            print("sklearn", sklearn.__version__)
        except Exception as e:
            print("Import failed:", e, file=sys.stderr)
            raise
        PY
    - name: Run tests
      run: python -X faulthandler -m pytest -q --tb=short
