name: Tests
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip setuptools wheel
        # Prefer prebuilt wheels for binary packages
        pip install --upgrade --prefer-binary numpy pyarrow
        # Disable build isolation so the preinstalled numpy/pyarrow are available to the build process
        PIP_NO_BUILD_ISOLATION=1 pip install -e ".[dev]"
    - name: Run tests
      run: python -X faulthandler -m pytest -q --tb=short
